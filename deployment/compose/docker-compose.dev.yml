version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: survey
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.dev
    environment:
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/survey
      REDIS_URL: redis://redis:6379
      ENV: dev
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../../src:/app/src
    command: uvicorn survey_finder.bootstrap.app:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
